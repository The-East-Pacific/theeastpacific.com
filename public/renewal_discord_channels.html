<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TEP Channel Merger Previewer — Tep Worlds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=League+Spartan:wght@700;800;900&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#fcfcf8;--ink:#121212;--green:#1B5E2A;--yellow:#F9E030;--line:#E8E6DD;--muted:#6b6b6b}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:Sora,system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1{font-family:League Spartan,sans-serif;font-weight:900;letter-spacing:-0.04em;line-height:0.82}
.font-climate{font-family:'Climate Crisis',sans-serif;font-weight:400;line-height:0.9}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
@media(min-width:900px){.container{padding:0 32px}}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:white;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--line);background:white;transition:.15s}
.btn-dark{background:var(--ink);color:white;border-color:var(--ink)}
.merger-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#f8f7f2;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.merger-chip.active{background:var(--ink);color:white;border-color:var(--ink)}
.merger-chip.muted{opacity:.3}
.merger-chip.src-TEP{border-left:3px solid var(--green)}
.merger-chip.src-Urth{border-left:3px solid #3a8a4e}
.merger-chip.src-RMB{border-left:3px solid #c9a200}
.dest-bucket{background:var(--ink);color:white;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,.1)}
.dest-bucket.active{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow)}
.dest-chip{display:inline-flex;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:11px;font-weight:600;cursor:pointer;color:white}
.dest-chip.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow);font-weight:800}
.dest-chip.muted{opacity:.25}
</style>
</head>
<body>
<header style="padding:20px 0;border-bottom:1px solid var(--line);background:rgba(252,252,248,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10">
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--green);display:grid;place-items:center;color:white;font-weight:900;font-size:12px">TEP</div>
      <div>
        <div class="font-climate" style="font-size:18px">TEP WORLDS</div>
        <div style="font-size:9px;letter-spacing:.15em;font-weight:800;opacity:.5;text-transform:uppercase">Channel Merger Previewer</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="./renewal.html" class="pill">← Proposal</a>
      <div class="pill" style="background:var(--ink);color:white">Social Hub</div>
    </div>
  </div>
</header>

<section style="padding:32px 0 24px">
  <div class="container">
    <h1 style="font-size:clamp(36px,8vw,64px)">CHANNEL<br>MERGER<br><span style="color:var(--green)" class="font-climate">PREVIEWER</span></h1>
    <p style="margin-top:12px;font-size:14px;color:var(--muted);max-width:52ch;line-height:1.6">No image — just your data from the PNG, made clickable. Tap a source to see where it lands. Tap a hub channel to see what feeds it.</p>
    
    <div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="mergerSearch" placeholder="Filter… cat, irl, politics, gaming" style="flex:1;min-width:200px;height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line);font-size:13px;background:white">
      <button class="btn" onclick="setMergerFilter('all')">All</button>
      <button class="btn" onclick="setMergerFilter('The East Pacific')">TEP</button>
      <button class="btn" onclick="setMergerFilter('Urth')">Urth</button>
      <button class="btn" onclick="setMergerFilter('RMB Cafeteria')">RMB</button>
      <button class="btn btn-dark" onclick="clearMerger()">Clear</button>
    </div>

    <div id="mergerDetail" style="margin-top:16px;background:var(--yellow);border:1px solid var(--ink);border-radius:12px;padding:12px 16px;font-size:12px;line-height:1.5;display:none"></div>

    <div style="margin-top:20px;display:grid;gap:16px">
      <div style="background:white;border:1px solid var(--line);border-radius:16px;padding:16px">
        <div style="font-size:10px;font-weight:800;letter-spacing:.15em;opacity:.4;margin-bottom:12px">WHERE CHANNELS CAME FROM — 28 channels</div>
        <div id="sourceList" style="display:grid;gap:18px"></div>
      </div>
      <div id="destList" style="display:grid;gap:12px"></div>
    </div>

    <div style="margin-top:24px;font-size:11px;opacity:.5;line-height:1.6">&copy 2026 Tep Worlds.</div>
  </div>
</section>

<script>
const MERGER_DATA = [
  {src:"#the-lounge", origin:"The East Pacific", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#tep-chat", origin:"The East Pacific", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#irl-and-pet-pics", origin:"The East Pacific", dest:"#irl-and-pets", bucket:"Social Hub"},
  {src:"#politics-debates", origin:"The East Pacific", dest:"#politics", bucket:"Social Hub"},
  {src:"#worlds-to-build", origin:"The East Pacific", dest:"#creative-arts", bucket:"Social Hub"},
  {src:"#creativity", origin:"The East Pacific", dest:"#creative-arts", bucket:"Social Hub"},
  {src:"#things-people-said", origin:"The East Pacific", dest:"#memes", bucket:"Social Hub"},
  {src:"#bots-and-spam", origin:"The East Pacific", dest:"#bot-commands", bucket:"Social Hub"},
  {src:"#general", origin:"Urth", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#memes-mart", origin:"Urth", dest:"#memes", bucket:"Social Hub"},
  {src:"#things-people-say", origin:"Urth", dest:"#memes", bucket:"Social Hub"},
  {src:"#the-arts", origin:"Urth", dest:"#creative-arts", bucket:"Social Hub"},
  {src:"#animals-and-plant-friends", origin:"Urth", dest:"#irl-and-pets", bucket:"Social Hub"},
  {src:"#tea-party", origin:"Urth", dest:"#cat-chat", bucket:"Offbeat Lounge"},
  {src:"#commands-and-spam", origin:"Urth", dest:"#bot-commands", bucket:"Social Hub"},
  {src:"#cat-chat", origin:"RMB Cafeteria", dest:"#cat-chat", bucket:"Offbeat Lounge"},
  {src:"#car-chat", origin:"RMB Cafeteria", dest:"#car-chat", bucket:"Offbeat Lounge"},
  {src:"#music-chat", origin:"RMB Cafeteria", dest:"#music-chat", bucket:"Offbeat Lounge"},
  {src:"#gaming", origin:"RMB Cafeteria", dest:"#gaming", bucket:"Offbeat Lounge"},
  {src:"#spam", origin:"RMB Cafeteria", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#sportsball", origin:"RMB Cafeteria", dest:"#sportsball", bucket:"Offbeat Lounge"},
  {src:"#アーミー", origin:"RMB Cafeteria", dest:"#アニメ", bucket:"Offbeat Lounge"},
  {src:"#pets", origin:"RMB Cafeteria", dest:"#irl-and-pets", bucket:"Social Hub"},
  {src:"#politics", origin:"RMB Cafeteria", dest:"#politics", bucket:"Social Hub"},
  {src:"#irl-pics", origin:"RMB Cafeteria", dest:"#irl-and-pets", bucket:"Social Hub"},
  {src:"#irl-chat", origin:"RMB Cafeteria", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#cafeteria", origin:"RMB Cafeteria", dest:"#general-chat", bucket:"Social Hub"},
  {src:"#shitposting", origin:"RMB Cafeteria", dest:"#memes", bucket:"Social Hub"},
];
const DEST_BUCKETS = [
  {name:"Social Hub", desc:"Main hangout", channels:["#general-chat","#irl-and-pets","#creative-arts","#politics","#memes","#bot-commands"]},
  {name:"Offbeat Lounge", desc:"Cat, car, music, anime", channels:["#cat-chat","#car-chat","#music-chat","#sportsball","#gaming","#アニメ"]},
  {name:"Onboarding", desc:"NEW bot + chooser", channels:["#orientation"], isNew:true},
];
let activeSrc=null, activeDest=null, filterOrigin='all', searchQ='';
function render(){
  const srcList=document.getElementById('sourceList');
  const destList=document.getElementById('destList');
  let filtered=MERGER_DATA.filter(d=>{
    if(filterOrigin!=='all' && d.origin!==filterOrigin) return false;
    if(searchQ && !d.src.toLowerCase().includes(searchQ.toLowerCase()) && !d.dest.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
  const byOrigin={};
  filtered.forEach(d=>{ if(!byOrigin[d.origin]) byOrigin[d.origin]=[]; byOrigin[d.origin].push(d); });
  srcList.innerHTML = Object.keys(byOrigin).map(origin=>`
    <div>
      <div style="font-size:10px;font-weight:800;letter-spacing:.12em;opacity:.5;margin-bottom:8px">${origin.toUpperCase()} — ${byOrigin[origin].length}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${byOrigin[origin].map(d=>`<button class="merger-chip src-${origin.split(' ')[0]} ${activeSrc===d.src?'active':''} ${activeDest && d.dest!==activeDest?'muted':''}" onclick="selectSrc('${d.src}')">${d.src} <span style="opacity:.5">→ ${d.dest}</span></button>`).join('')}
      </div>
    </div>
  `).join('') || '<div style="opacity:.5;padding:8px">No match</div>';

  destList.innerHTML = DEST_BUCKETS.map(bucket=>`
    <div class="dest-bucket ${bucket.channels.includes(activeDest)?'active':''}" style="${bucket.isNew?'border:1px dashed var(--yellow)':''}">
      <div style="font-size:11px;font-weight:800;letter-spacing:.12em;opacity:.7">${bucket.name} ${bucket.isNew?'<span style="background:var(--yellow);color:var(--ink);padding:2px 6px;border-radius:999px;margin-left:6px">NEW</span>':''}</div>
      <div style="font-size:11px;opacity:.5;margin-top:2px">${bucket.desc}</div>
      <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">
        ${bucket.channels.map(ch=>{
          const sources=MERGER_DATA.filter(d=>d.dest===ch);
          return `<button class="dest-chip ${activeDest===ch?'active':''} ${activeSrc && !sources.some(s=>s.src===activeSrc)?'muted':''}" onclick="selectDest('${ch}')">${ch} ${sources.length?`<span style="opacity:.6">(${sources.length})</span>`:''}</button>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  const detail=document.getElementById('mergerDetail');
  if(activeSrc || activeDest){
    detail.style.display='block';
    if(activeSrc){
      const item=MERGER_DATA.find(d=>d.src===activeSrc);
      const same=MERGER_DATA.filter(d=>d.dest===item.dest);
      detail.innerHTML=`<b>${item.src}</b> <span style="opacity:.6">from ${item.origin}</span> → <b>${item.dest}</b> in ${item.bucket}. <br><span style="opacity:.6">Also merging into ${item.dest}:</span> ${same.map(d=>d.src).join(', ')}`;
    } else if(activeDest){
      const srcs=MERGER_DATA.filter(d=>d.dest===activeDest);
      detail.innerHTML=`<b>${activeDest}</b> will contain ${srcs.length} channels: ${srcs.map(s=>s.src+' ('+s.origin+')').join(', ')}`;
    }
  } else detail.style.display='none';
}
function selectSrc(src){ if(activeSrc===src){ activeSrc=null; } else { activeSrc=src; activeDest=MERGER_DATA.find(d=>d.src===src)?.dest||null; } render(); }
function selectDest(dest){ if(activeDest===dest){ activeDest=null; activeSrc=null; } else { activeDest=dest; activeSrc=null; } render(); }
function setMergerFilter(o){ filterOrigin=o; render(); }
function clearMerger(){ activeSrc=null; activeDest=null; filterOrigin='all'; searchQ=''; document.getElementById('mergerSearch').value=''; render(); }
document.addEventListener('DOMContentLoaded', ()=>{
  render();
  document.getElementById('mergerSearch').addEventListener('input', e=>{ searchQ=e.target.value; render(); });
});
</script>
</body>
</html>
